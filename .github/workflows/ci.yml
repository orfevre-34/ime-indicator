name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo build --release
        run: cargo build --release

      - name: Verify binary size budget (< 1 MB)
        shell: pwsh
        run: |
          $exe = "target/release/ime-indicator.exe"
          $sz = (Get-Item $exe).Length
          $kb = [math]::Round($sz / 1KB, 1)
          Write-Host "Release binary size: $sz bytes ($kb KB)"
          if ($sz -gt 1MB) {
            Write-Error "Binary size $sz exceeds 1 MB budget"
            exit 1
          }
